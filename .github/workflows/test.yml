name: Test


on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - run: sudo apt update && sudo apt install -y libpam0g-dev

    - name: Install dependencies
      run: go mod tidy

    - name: Run unit tests
      run: go test -v -short ./...

    - name: Build binary
      run: go build -o chpass-web
