name: Test


on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - run: sudo apt update && sudo apt install -y libpam0g-dev

    - name: Install dependencies
      run: go mod download

    - name: Run unit tests
      run: go test -v -short ./...

    - name: Build binary
      run: go build -o chpass-web

    - name: Verify binary
      run: |
        sudo ./chpass-web &
        CHPID=$!
        sleep 2
        curl -s http://localhost:8080/ | grep -q "Password Change" && echo "Binary works" || exit 1
        kill $CHPID
