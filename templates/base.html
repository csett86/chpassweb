<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Change</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        h1 { color: #333; margin-bottom: 20px; }
        .prompt { background: #f8f9fa; border-left: 4px solid #007bff; padding: 15px; margin: 20px 0; font-size: 1.1em; }
        form { display: flex; flex-direction: column; gap: 15px; }
        label { font-weight: 600; color: #555; }
        input[type="password"] { padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; }
        input[type="password"]:focus { outline: none; border-color: #007bff; }
        button { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .error { color: #721c24; background: #f8d7da; padding: 15px; border-radius: 4px; margin: 20px 0; }
        .success { color: #155724; background: #d4edda; padding: 15px; border-radius: 4px; margin: 20px 0; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    {{template "content" .}}
</body>
</html>
